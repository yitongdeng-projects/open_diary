media:
  # Uploaded images live here in the repo...
  input: public/images
  # ...and are served from this URL path (note the /open_diary base).
  output: /open_diary/images

content:
  - name: posts
    label: Entries
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: description
        label: Description
        type: text
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: body
        label: Entry
        type: rich-text
        options:
          format: markdown
          media: true
          path: public/images
          rename: true
